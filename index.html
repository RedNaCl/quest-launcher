<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest/安卓 应用高级启动器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 500px; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 1.25rem; display: flex; align-items: center; gap: 8px; }
        .badge { font-size: 0.7rem; background: #e8f0fe; color: #1967d2; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; color: #5f6368; margin-bottom: 6px; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #1a73e8; background-color: #f8fbff; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: white; }
        .btn-primary { background-color: #1a73e8; }
        .btn-primary:hover { background-color: #1765cc; transform: translateY(-1px); }
        .btn-secondary { background-color: #34a853; }
        .btn-secondary:hover { background-color: #2d9249; transform: translateY(-1px); }
        
        .help-text { font-size: 0.8rem; color: #70757a; margin-top: 12px; line-height: 1.4; }
        code { background: #f1f3f4; padding: 2px 4px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>方式 A：自定义协议 <span class="badge">URI Scheme</span></h2>
        <div class="input-group">
            <label>应用协议 (Scheme):</label>
            <input type="text" id="scheme" placeholder="例如: vrzwkquesttool" value="vrzwkquesttool">
        </div>
        <div class="input-group">
            <label>路径 (Path):</label>
            <input type="text" id="path" placeholder="例如: open" value="launch?package=com.android.settings">
        </div>
        <button class="btn btn-primary" onclick="launchScheme()">启动自定义应用</button>
        <p class="help-text">适用于开发者已适配 Web 启动的应用。链接格式：<code>scheme://path</code></p>
    </div>

    <div class="card">
        <h2>方式 B：安卓强行启动 <span class="badge">Intent</span></h2>
        <div class="input-group">
            <label>应用包名 (Package Name):</label>
            <input type="text" id="pkgName" placeholder="例如: com.android.settings">
        </div>
        <div class="input-group">
            <label>动作 (Action - 可选):</label>
            <input type="text" id="intentAction" placeholder="例如: android.settings.WIFI_SETTINGS">
        </div>
        <button class="btn btn-secondary" onclick="launchIntent()">通过 Intent 启动</button>
        <div class="help-text">
            针对 Quest/安卓。只要知道包名就能尝试启动。<br>
            常用包名：<br>
            • 设置：<code>com.android.settings</code><br>
            • 常用设置 Action：<code>android.settings.SETTINGS</code>
        </div>
    </div>
</div>

<script>
    // 逻辑 A：自定义协议启动
    function launchScheme() {
        const scheme = document.getElementById('scheme').value.trim();
        const path = document.getElementById('path').value.trim();
        if (!scheme) return alert('请输入协议名');
        
        const url = `${scheme}://${path}`;
        console.log('Scheme 启动:', url);
        window.location.href = url;
    }

    // 逻辑 B：Intent 协议启动
    function launchIntent() {
        const pkg = document.getElementById('pkgName').value.trim();
        const action = document.getElementById('intentAction').value.trim();
        
        if (!pkg && !action) {
            return alert('包名和动作至少需要填写一个');
        }

        // 构建 Android Intent 字符串
        // 格式：intent:#Intent;package=包名;action=动作;end
        let intentUrl = "intent:#Intent;";
        if (action) intentUrl += `action=${action};`;
        if (pkg) intentUrl += `package=${pkg};`;
        intentUrl += "end";

        console.log('Intent 启动:', intentUrl);
        window.location.href = intentUrl;
    }
</script>

</body>
</html>
