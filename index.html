<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest 应用启动器</title>
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { width: 90%; max-width: 400px; }
    input { width: 100%; padding: 16px; font-size: 18px; background: #222; color: #fff; border: 1px solid #444; border-radius: 12px; margin-bottom: 16px; }
    button { width: 100%; padding: 18px; font-size: 20px; font-weight: bold; background: #4f46e5; color: #fff; border: none; border-radius: 12px; cursor: pointer; }
    button:active { background: #3730a3; }
    .tip { margin-top: 16px; font-size: 13px; color: #888; text-align: center; }
  </style>
</head>
<body>
<div class="box">
  <input type="text" id="pkgInput" placeholder="输入包名，如 com.beatgames.beatsaber" autofocus>
  <button id="launchBtn">打开应用</button>
  <div class="tip">Quest 专用 · 请使用 HTTPS 打开本页</div>
</div>

<script>
  document.getElementById('launchBtn').addEventListener('click', () => {
    const pkg = document.getElementById('pkgInput').value.trim();
    if (!pkg) return;

    // Quest 系统通过 vrshell 的 COMMAND 启动 VR 应用
    const intent = `intent://#Intent;action=com.oculus.vrshell.COMMAND;package=com.oculus.vrshell;S.command=launch;S.package_name=${encodeURIComponent(pkg)};end;`;

    const a = document.createElement('a');
    a.href = intent;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
</script>
</body>
</html>
