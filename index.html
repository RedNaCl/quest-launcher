<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义应用启动器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .launch-btn { background-color: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.3s; margin-top: 1rem; }
        .launch-btn:hover { background-color: #45a049; }
        .tip { font-size: 0.8rem; color: #999; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>应用启动器</h1>
    
    <div class="input-group">
        <label>应用协议 (Scheme):</label>
        <input type="text" id="scheme" placeholder="例如: vrzwkquesttool" value="vrzwkquesttool">
    </div>

    <div class="input-group">
        <label>启动指令/路径:</label>
        <input type="text" id="path" placeholder="例如: open" value="open">
    </div>

    <button class="launch-btn" id="launchBtn">立即启动应用</button>
    
    <p class="tip">提示：确保您的电脑已安装相关应用并支持该协议。</p>
</div>

<script>
    document.getElementById('launchBtn').addEventListener('click', function() {
        const scheme = document.getElementById('scheme').value.trim();
        const path = document.getElementById('path').value.trim();
        
        if (!scheme) {
            alert('请输入协议名称！');
            return;
        }

        // 拼接成完整的深层链接地址
        const fullUrl = scheme + '://' + path;
        
        console.log('正在尝试启动:', fullUrl);
        
        // 核心跳转逻辑
        window.location.href = fullUrl;

        // 如果想在启动后自动关闭网页，可以取消下面代码的注释
        // setTimeout(() => { window.close(); }, 1000);
    });
</script>

</body>
</html>
