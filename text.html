<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打开应用</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #111; color: #fff; font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .container { width: 100%; max-width: 420px; }
    input { width: 100%; padding: 18px; font-size: 18px; background: #222; color: #fff; border: 1px solid #444; border-radius: 14px; margin-bottom: 16px; outline: none; }
    button { width: 100%; padding: 18px; font-size: 20px; font-weight: bold; background: #4f46e5; color: #fff; border: none; border-radius: 14px; cursor: pointer; }
    button:active { background: #3730a3; }
    .tip { margin-top: 20px; font-size: 14px; color: #888; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <input type="text" id="pkgInput" placeholder="输入完整包名，例如 com.android.settings" autofocus>
  <button id="launchBtn">打开应用</button>
  <div class="tip">请确保应用已安装 · 网页需为 HTTPS</div>
</div>

<script>
  document.getElementById('launchBtn').addEventListener('click', () => {
    const pkg = document.getElementById('pkgInput').value.trim();
    if (!pkg) return;

    // 标准 intent 启动主 Activity
    const intent = `intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=${encodeURIComponent(pkg)};end;`;

    // 触发跳转
    const a = document.createElement('a');
    a.href = intent;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
</script>
</body>
</html>
